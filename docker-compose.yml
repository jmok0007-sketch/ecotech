# Optional: spin up Postgres + the Flask backend locally with one command.
# Frontend is run separately with `npm run dev` (much faster HMR loop).
#
#   docker compose up --build
#
# After the DB is up:
#   docker compose exec db psql -U ecotech_user -d ecotech -f /seeds/create_tables.sql

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ecotech
      POSTGRES_USER: ecotech_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema:/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecotech_user -d ecotech"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 8000
        CMD ["gunicorn", "app:app", "--bind", "0.0.0.0:8000", "--workers", "2"]
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ecotech
      DB_USER: ecotech_user
      DB_PASSWORD: change_me
      CORS_ORIGINS: http://localhost:5173
      FLASK_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
